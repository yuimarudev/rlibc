name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  quality-gate-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run PR Profile
        env:
          RLIBC_FAILURE_LOG_ENABLED: "0"
        run: bash scripts/quality-gate.sh --profile pr --continue-on-fail

  quality-gate-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Dry-Run libc-test Smoke Adapter
        env:
          RLIBC_LIBC_TEST_ROOT: /tmp/libc-test
        run: bash scripts/conformance/libc-test-adapter.sh --dry-run --profile docs/conformance/libc-test-smoke.txt
      - name: Run Nightly Profile
        env:
          RLIBC_FAILURE_LOG_ENABLED: "0"
        run: bash scripts/quality-gate.sh --profile nightly --continue-on-fail

  quality-gate-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Dry-Run libc-test Smoke Adapter
        env:
          RLIBC_LIBC_TEST_ROOT: /tmp/libc-test
        run: bash scripts/conformance/libc-test-adapter.sh --dry-run --profile docs/conformance/libc-test-smoke.txt
      - name: Run Full Profile
        env:
          RLIBC_FAILURE_LOG_ENABLED: "0"
        run: bash scripts/quality-gate.sh --profile full --continue-on-fail

  libc-test-smoke-nightly:
    if: github.event_name == 'schedule' && vars.RLIBC_LIBC_TEST_ROOT != ''
    runs-on: ubuntu-latest
    needs: quality-gate-nightly
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run libc-test Smoke Adapter
        env:
          RLIBC_LIBC_TEST_ROOT: ${{ vars.RLIBC_LIBC_TEST_ROOT }}
        run: bash scripts/conformance/libc-test-adapter.sh --profile docs/conformance/libc-test-smoke.txt

  libc-test-smoke-full:
    if: github.event_name == 'workflow_dispatch' && vars.RLIBC_LIBC_TEST_ROOT != ''
    runs-on: ubuntu-latest
    needs: quality-gate-full
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run libc-test Smoke Adapter
        env:
          RLIBC_LIBC_TEST_ROOT: ${{ vars.RLIBC_LIBC_TEST_ROOT }}
        run: bash scripts/conformance/libc-test-adapter.sh --profile docs/conformance/libc-test-smoke.txt

  ltp-openposix-smoke-nightly:
    if: github.event_name == 'schedule' && vars.RLIBC_LTP_SUITE_ROOT != ''
    runs-on: ubuntu-latest
    needs: quality-gate-nightly
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run LTP/OpenPOSIX Smoke Adapter
        env:
          RLIBC_LTP_SUITE_ROOT: ${{ vars.RLIBC_LTP_SUITE_ROOT }}
          RLIBC_LTP_SUITE: ${{ vars.RLIBC_LTP_SUITE }}
        run: bash scripts/conformance/ltp-openposix-adapter.sh --suite "${RLIBC_LTP_SUITE:-ltp}" --suite-root "${RLIBC_LTP_SUITE_ROOT}"

  ltp-openposix-smoke-full:
    if: github.event_name == 'workflow_dispatch' && vars.RLIBC_LTP_SUITE_ROOT != ''
    runs-on: ubuntu-latest
    needs: quality-gate-full
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run LTP/OpenPOSIX Smoke Adapter
        env:
          RLIBC_LTP_SUITE_ROOT: ${{ vars.RLIBC_LTP_SUITE_ROOT }}
          RLIBC_LTP_SUITE: ${{ vars.RLIBC_LTP_SUITE }}
        run: bash scripts/conformance/ltp-openposix-adapter.sh --suite "${RLIBC_LTP_SUITE:-ltp}" --suite-root "${RLIBC_LTP_SUITE_ROOT}"
